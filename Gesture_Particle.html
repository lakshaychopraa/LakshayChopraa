<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTICLE CONJURER - HIGH RESPONSE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600&family=Orbitron:wght@400;700&display=swap');

:root {
  --glass: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.15);
  --accent: #00ffc8;
  --text: rgba(255,255,255,0.7);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background: #000; overflow: hidden; font-family: 'Rajdhani', sans-serif; color: var(--text); }

#three-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

#cam-wrap {
  position: fixed; bottom: 28px; right: 28px; z-index: 20;
  width: 180px; height: 135px; border-radius: 12px;
  overflow: hidden; border: 2px solid var(--accent);
  background: #000; box-shadow: 0 0 20px rgba(0,255,200,0.2);
}
#webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.4; }
#cam-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }

#hud { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 15; pointer-events: none; }
#title-block { position: absolute; top: 32px; left: 40px; }
#title-main { font-family: 'Orbitron', sans-serif; font-size: 24px; letter-spacing: 6px; color: #fff; text-shadow: 0 0 20px var(--accent); }

#gesture-guide {
  position: absolute; top: 32px; right: 40px;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
}
.gest-item {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.2);
  transition: 0.1s; /* Faster UI transition */
}
.gest-icon { font-size: 16px; filter: grayscale(1); }
.gest-active { color: var(--accent); text-shadow: 0 0 10px var(--accent); font-weight: bold; transform: scale(1.1); }
.gest-active .gest-icon { filter: grayscale(0); }

#info-bar { position: absolute; bottom: 28px; left: 40px; display: flex; gap: 30px; }
.info-val { font-family: 'Orbitron', monospace; color: #fff; font-size: 18px; }

#center-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: all; z-index: 100; }
#perm-btn { padding: 15px 40px; border-radius: 50px; background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; letter-spacing: 2px; box-shadow: 0 0 30px var(--accent); }

#gesture-flash { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; opacity: 0; transition: 0.15s; pointer-events: none; z-index: 5; }
</style>
</head>
<body>

<canvas id="three-canvas"></canvas>

<div id="hud">
  <div id="title-block">
    <div id="title-main">PARTICLE CONJURER</div>
    <div style="font-size: 10px; letter-spacing: 3px; opacity: 0.5;">HIGH-RESPONSE ENGINE</div>
  </div>

  <div id="gesture-guide">
    <div class="gest-item" id="gi-open"><span class="gest-icon">✋</span>OPEN — EXPAND</div>
    <div class="gest-item" id="gi-fist"><span class="gest-icon">✊</span>FIST — CONTRACT</div>
    <div class="gest-item" id="gi-point"><span class="gest-icon">☝️</span>POINT — COLOR SHIFT</div>
    <div class="gest-item" id="gi-peace"><span class="gest-icon">✌️</span>PEACE — SPIN</div>
    <div class="gest-item" id="gi-ok"><span class="gest-icon">👌</span>OK — EXPLODE</div>
    <div class="gest-item" id="gi-pinch"><span class="gest-icon">🤏</span>PINCH — NEXT SHAPE</div>
  </div>

  <div id="info-bar">
    <div><p style="font-size: 9px;">CORE STATE</p><div class="info-val" id="iv-shape">SPHERE</div></div>
    <div><p style="font-size: 9px;">ACTIVE GESTURE</p><div class="info-val" id="iv-gesture">IDLE</div></div>
  </div>

  <div id="gesture-flash"></div>

  <div id="center-status">
    <button id="perm-btn">ACTIVATE SYSTEM</button>
  </div>
</div>

<div id="cam-wrap">
  <video id="webcam" autoplay muted playsinline></video>
  <canvas id="cam-canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- CONFIGURATION ---
const COUNT = 12000;
const LERP_SPEED = 0.25; // How fast particles snap to targets (was 0.1)
const SPREAD_STEP = 0.15; // How fast expand/contract happens (was 0.05)
const DEBOUNCE_TIME = 350; // Delay between triggers (was 1000)

// --- THREE JS INITIALIZATION ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
camera.position.z = 220;

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const pos = new Float32Array(COUNT * 3);
const target = new Float32Array(COUNT * 3);
const velocity = new Float32Array(COUNT * 3);
const colors = new Float32Array(COUNT * 3);

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const mat = new THREE.PointsMaterial({
    size: 1.8,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 0.9,
    depthWrite: false
});

const points = new THREE.Points(geo, mat);
scene.add(points);

// --- SHAPES DATA ---
const shapeNames = ['sphere', 'heart', 'flower', 'saturn', 'dna', 'tornado'];
const shapes = {
    sphere: (i) => {
        const phi = Math.acos(-1 + (2 * i) / COUNT);
        const theta = Math.sqrt(COUNT * Math.PI) * phi;
        return [75 * Math.cos(theta) * Math.sin(phi), 75 * Math.sin(theta) * Math.sin(phi), 75 * Math.cos(phi)];
    },
    heart: (i) => {
        const t = (i / COUNT) * Math.PI * 2;
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        return [x * 4.5, y * 4.5, (Math.random() - 0.5) * 15];
    },
    flower: (i) => {
        const t = (i / COUNT) * Math.PI * 2;
        const r = 80 * Math.cos(5 * t);
        return [r * Math.cos(t), r * Math.sin(t), (Math.random() - 0.5) * 15];
    },
    saturn: (i) => {
        if (i < COUNT * 0.4) return shapes.sphere(i); 
        const a = Math.random() * Math.PI * 2;
        const r = 90 + Math.random() * 40;
        return [r * Math.cos(a), (Math.random()-0.5)*8, r * Math.sin(a)];
    },
    dna: (i) => {
        const t = (i / COUNT) * 20;
        const side = i % 2 === 0 ? 1 : -1;
        return [Math.cos(t) * 40 * side, t * 12 - 120, Math.sin(t) * 40 * side];
    },
    tornado: (i) => {
        const h = (i / COUNT) * 180 - 90;
        const r = (h + 100) * 0.6;
        const a = h * 0.4;
        return [r * Math.cos(a), h, r * Math.sin(a)];
    }
};

let currentShape = 'sphere';
function morph(name) {
    currentShape = name;
    const fn = shapes[name];
    for (let i = 0; i < COUNT; i++) {
        const [x, y, z] = fn(i);
        target[i*3] = x; target[i*3+1] = y; target[i*3+2] = z;
        const c = new THREE.Color().setHSL((i/COUNT + Math.random()*0.15)%1, 0.8, 0.6);
        colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
    }
    geo.attributes.color.needsUpdate = true;
    document.getElementById('iv-shape').textContent = name.toUpperCase();
}
morph('sphere');

// --- MEDIAPIPE ---
const videoElement = document.getElementById('webcam');
const canvasCtx = document.getElementById('cam-canvas').getContext('2d');
let spread = 1.0;
let rotationSpeed = 0.005;
let colorShift = false;
let lastTrigger = 0;

const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
});

hands.onResults((results) => {
    canvasCtx.clearRect(0, 0, 180, 135);
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00ffc8', lineWidth: 2});
        detectGesture(landmarks);
    } else {
        resetGestures();
    }
});

function detectGesture(lm) {
    const isIndexUp = lm[8].y < lm[6].y;
    const isMiddleUp = lm[12].y < lm[10].y;
    const isRingUp = lm[16].y < lm[14].y;
    const isPinkyUp = lm[20].y < lm[18].y;
    const thumbIndexDist = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);

    let g = "none";
    if (thumbIndexDist < 0.06) {
        g = (isPinkyUp && isRingUp) ? "ok" : "pinch";
    } 
    else if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) g = "open";
    else if (!isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) g = "fist";
    else if (isIndexUp && isMiddleUp && !isRingUp) g = "peace";
    else if (isIndexUp && !isMiddleUp) g = "point";

    updateUI(g);

    // Continuous 
    if (g === "open") spread = Math.min(spread + SPREAD_STEP, 4.0);
    if (g === "fist") spread = Math.max(spread - SPREAD_STEP, 0.1);
    if (g === "peace") rotationSpeed = 0.08; else rotationSpeed = 0.005;
    if (g === "point") colorShift = true; else colorShift = false;
    
    // Triggered
    if (Date.now() - lastTrigger > DEBOUNCE_TIME) {
        if (g === "ok") {
            for(let i=0; i<COUNT*3; i++) velocity[i] = (Math.random()-0.5)*40;
            flash("BOOM! 💥");
            lastTrigger = Date.now();
        }
        if (g === "pinch") {
            const nextIdx = (shapeNames.indexOf(currentShape) + 1) % shapeNames.length;
            morph(shapeNames[nextIdx]);
            flash("NEXT 🤏");
            lastTrigger = Date.now();
        }
    }
}

function updateUI(g) {
    document.querySelectorAll('.gest-item').forEach(el => el.classList.remove('gest-active'));
    const activeEl = document.getElementById('gi-' + g);
    if (activeEl) {
        activeEl.classList.add('gest-active');
        document.getElementById('iv-gesture').textContent = g.toUpperCase();
    }
}

function resetGestures() {
    document.querySelectorAll('.gest-item').forEach(el => el.classList.remove('gest-active'));
    document.getElementById('iv-gesture').textContent = "SEARCHING...";
    colorShift = false;
}

function flash(txt) {
    const el = document.getElementById('gesture-flash');
    el.textContent = txt; el.style.opacity = 1;
    setTimeout(() => el.style.opacity = 0, 300);
}

// --- MAIN LOOP ---
function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.002;
    const positions = geo.attributes.position.array;
    const colorAttr = geo.attributes.color.array;

    for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        // Snap to target with high speed
        positions[i3] += (target[i3] * spread - positions[i3]) * LERP_SPEED + velocity[i3];
        positions[i3+1] += (target[i3+1] * spread - positions[i3+1]) * LERP_SPEED + velocity[i3+1];
        positions[i3+2] += (target[i3+2] * spread - positions[i3+2]) * LERP_SPEED + velocity[i3+2];
        
        velocity[i3] *= 0.85; velocity[i3+1] *= 0.85; velocity[i3+2] *= 0.85;

        if (colorShift) {
            const c = new THREE.Color().setHSL((time + i/COUNT) % 1, 0.8, 0.6);
            colorAttr[i3] = c.r; colorAttr[i3+1] = c.g; colorAttr[i3+2] = c.b;
        }
    }
    
    geo.attributes.position.needsUpdate = true;
    if (colorShift) geo.attributes.color.needsUpdate = true;
    points.rotation.y += rotationSpeed;
    renderer.render(scene, camera);
}

document.getElementById('perm-btn').addEventListener('click', () => {
    document.getElementById('center-status').style.display = 'none';
    new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
    }).start();
    animate();
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
