<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Space Balloon Pop AR</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #0b0b26;
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
            user-select: none; color: #fff;
        }

        #webcam {
            position: absolute; width: 180px; height: 135px;
            bottom: 20px; left: 20px; transform: scaleX(-1);
            border: 4px solid #ff00ff; border-radius: 12px; z-index: 10;
            background: #111;
        }

        #canvas-container { position: absolute; width: 100vw; height: 100vh; z-index: 5; }

        /* HUD Styles */
        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            z-index: 20; display: flex; justify-content: space-between; pointer-events: none;
        }

        .hud-panel {
            background: rgba(255, 255, 255, 0.15); padding: 15px 25px;
            border-radius: 20px; border: 3px solid #fff;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        #score-container h1 { margin: 0; font-size: 42px; color: #ccff00; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        #status-container { text-align: right; }
        .counter-label { font-size: 16px; font-weight: bold; color: #00ffff; text-transform: uppercase; letter-spacing: 1px; }
        #target-countdown { font-size: 36px; color: #fff; font-weight: bold; }

        /* VFX Layer */
        #vfx-layer { position: absolute; width: 100vw; height: 100vh; top: 0; left: 0; z-index: 15; pointer-events: none; }
        .vfx-text {
            position: absolute; font-size: 55px; font-weight: bold;
            text-shadow: 3px 3px 0px #000; animation: floatOut 0.6s ease-out forwards;
        }
        @keyframes floatOut {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -70%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -110%) scale(1.0); opacity: 0; }
        }

        /* Screens Setup */
        .screen {
            position: absolute; width: 100vw; height: 100vh; z-index: 30;
            background: radial-gradient(circle, #2c1654 0%, #0b0b26 100%); 
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        h1.title { font-size: 55px; color: #00ffff; text-shadow: 0 0 20px #00ffff, 4px 4px 0px #ff00ff; margin-bottom: 10px; }

        .btn {
            background: #ff00ff; color: white; border: 4px solid #fff;
            padding: 20px 50px; font-size: 32px; font-weight: bold; font-family: inherit; cursor: pointer;
            border-radius: 40px; margin-top: 25px; transition: all 0.2s; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .btn:hover { background: #ff55ff; transform: scale(1.05); }

        #summary-screen { display: none; }
        .stat-line { font-size: 28px; margin: 15px 0; color: #fff; }
        .stat-line b { color: #ccff00; font-size: 36px; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <div id="canvas-container"></div>
    <div id="vfx-layer"></div>

    <!-- HUD -->
    <div id="hud">
        <div id="score-container" class="hud-panel">
            <h1 id="score-val">🌟 0</h1>
        </div>
        
        <div id="status-container" class="hud-panel">
            <div class="counter-label">Balloons Left:</div>
            <div id="target-countdown">100</div>
        </div>
    </div>

    <!-- Screens System -->
    <div id="start-screen" class="screen">
        <h1 class="title">BALLOON POPPER! 🎈</h1>
        <p style="max-width: 600px; color: #fff; font-size: 22px; line-height: 1.6;">
            Make a <b>Pistol Hand 🔫</b> with your fingers!<br>
            Snap your <b>Thumb Down</b> to POP the floating shapes!
        </p>
        <button class="btn" id="start-btn">PLAY GAME! 🎉</button>
        <div id="loading-status" style="margin-top: 20px; color: #ff00ff; font-size: 18px; font-weight: bold;">Loading camera... get ready!</div>
    </div>

    <div id="summary-screen" class="screen">
        <h1 class="title" style="color: #ccff00; text-shadow: 0 0 20px #ccff00;">ALL DONE! 🌟</h1>
        <div style="margin: 20px 0; padding: 25px 40px; background: rgba(255,255,255,0.1); border-radius: 30px; border: 4px solid #fff;">
            <div class="stat-line">YOUR SCORE: <b id="res-score">0</b></div>
            <div class="stat-line">BALLOONS POPPED: <b id="res-hit" style="color: #00ffff;">0</b></div>
        </div>
        <button class="btn" id="restart-btn" style="background: #00ffff; color: #000;">PLAY AGAIN! 🔄</button>
    </div>

    <script>
        // --- DATA ARCHITECTURE ---
        const GAME_CONFIG = {
            targetPoolCount: 4,
            baseCooldown: 300, // Slightly faster cooldown for spam friendly play
            totalTargetsToSpawn: 100
        };

        let runtimeState = {
            score: 0,
            shotsHit: 0,
            targetsSpawnedSoFar: 0,
            active: false,
            lastFireTime: 0
        };

        let trackingActive = false;
        let lastKnownThumbY = null;
        let crosshairVector = new THREE.Vector2(-999, -999);

        // --- KIDS FRIENDLY AUDIO ENGINE ---
        const audioUnit = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(variant) {
            if (audioUnit.state === 'suspended') audioUnit.resume();
            const osc = audioUnit.createOscillator();
            const amp = audioUnit.createGain();
            osc.connect(amp); amp.connect(audioUnit.destination);
            const t = audioUnit.currentTime;

            if (variant === 'hit') { // Fun Laser / Pop Sound
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(1200, t + 0.15);
                amp.gain.setValueAtTime(0.3, t); amp.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                osc.start(t); osc.stop(t + 0.15);
            } else if (variant === 'gold') { // Sparkle sound
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, t);
                osc.frequency.setValueAtTime(900, t + 0.08);
                amp.gain.setValueAtTime(0.2, t); amp.gain.exponentialRampToValueAtTime(0.01, t + 0.25);
                osc.start(t); osc.stop(t + 0.25);
            }
        }

        // --- GRAPHICS ENVIRONMENT INITIALIZATION ---
        const viewport = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 12;

        const visualRenderer = new THREE.WebGLRenderer({ antialias: true });
        visualRenderer.setSize(window.innerWidth, window.innerHeight);
        visualRenderer.setClearColor(0x110b29);
        viewport.appendChild(visualRenderer.domElement);

        // Fun Bright Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const primeLight = new THREE.DirectionalLight(0xffffff, 0.8);
        primeLight.position.set(5, 10, 5);
        scene.add(primeLight);

        // Big Colorful Laser and Magic Wand Crosshair
        const laserGeometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, -10, 0), new THREE.Vector3(0, 10, 0)]);
        const laserMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 5 });
        const laserTrack = new THREE.Line(laserGeometry, laserMaterial);
        scene.add(laserTrack); laserTrack.visible = false;

        const reticleGeometry = new THREE.SphereGeometry(0.35, 16, 16); // Big circular magic wand tip
        const reticleMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const reticleObject = new THREE.Mesh(reticleGeometry, reticleMaterial);
        scene.add(reticleObject); reticleObject.visible = false;

        let trackingTargets = [];
        let debrisSystem = [];

        // --- EASY VISUAL BALLOON TARGET BLUEPRINT ---
        function assembleDiscMesh(goldenStatus) {
            const composite = new THREE.Group();
            
            // Big smooth round balloon sphere shape
            const coreGeo = new THREE.SphereGeometry(1.2, 32, 32); 
            
            // Bright neon colors for kids
            const colors = [0xff00ff, 0x00ffff, 0x00ff00, 0xff9900, 0xff0055];
            const randomColor = goldenStatus ? 0xffea00 : colors[Math.floor(Math.random() * colors.length)];

            const coreMat = new THREE.MeshStandardMaterial({
                color: randomColor,
                metalness: goldenStatus ? 0.7 : 0.1,
                roughness: 0.2,
                emissive: randomColor,
                emissiveIntensity: 0.2
            });
            const body = new THREE.Mesh(coreGeo, coreMat);
            composite.add(body);
            return composite;
        }

        class FlyingTarget {
            constructor() {
                this.isGold = false;
                this.mesh = assembleDiscMesh(false);
                this.scale = 1.3; // Much larger target scale baseline
                this.collisionRadius = 1.6;
                this.active = false;
                scene.add(this.mesh);
            }

            configureSpawn() {
                runtimeState.targetsSpawnedSoFar++;
                
                this.isGold = Math.random() < 0.15; // 15% gold star balloon rate
                scene.remove(this.mesh); // Rebuild to swap bright kid colors smoothly
                this.mesh = assembleDiscMesh(this.isGold);
                scene.add(this.mesh);

                this.mesh.scale.set(this.scale, this.scale, this.scale);
                this.collisionRadius = 1.6 * this.scale;

                // Simple left/right easy float trajectories
                const sourceSide = Math.random() > 0.5 ? 1 : -1;
                this.mesh.position.set(sourceSide * 15, -4 + Math.random() * 8, 0);
                
                // Very slow floating speeds perfect for a 5-year-old
                this.vx = -sourceSide * (0.03 + Math.random() * 0.03);
                this.vy = (0.01 + Math.random() * 0.02);
                this.gravity = 0.0; // No falling downward, objects float across smoothly

                this.mesh.visible = true;
                this.active = true;
            }

            processFrames() {
                if (!this.active) return;

                this.mesh.position.x += this.vx;
                this.mesh.position.y += this.vy;

                this.mesh.rotation.y += 0.01;

                // Border cleanup without penalties
                if (Math.abs(this.mesh.position.x) > 18 || Math.abs(this.mesh.position.y) > 10) {
                    this.active = false;
                    this.mesh.visible = false;
                    checkRoundCompletion();
                }
            }
        }

        // --- SPARKLING STAR BURST SHATTER ENGINE ---
        class Fragment {
            constructor(originPos, particleColor) {
                const geometry = new THREE.SphereGeometry(0.15, 8, 8);
                const material = new THREE.MeshBasicMaterial({ color: particleColor, transparent: true, opacity: 1 });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.copy(originPos);

                const radialAngle = Math.random() * Math.PI * 2;
                const force = 0.05 + Math.random() * 0.08;
                this.vx = Math.cos(radialAngle) * force;
                this.vy = Math.sin(radialAngle) * force;
                this.lifespan = 1.0;
                this.decayRate = 0.03;

                scene.add(this.mesh);
            }
            advance() {
                this.mesh.position.x += this.vx;
                this.mesh.position.y += this.vy;
                this.lifespan -= this.decayRate;
                this.mesh.material.opacity = this.lifespan;
                if (this.lifespan <= 0) {
                    scene.remove(this.mesh);
                    return false;
                }
                return true;
            }
        }

        function triggerShatterBurst(positionVector, tint) {
            const fragmentsCount = 12;
            for (let i = 0; i < fragmentsCount; i++) {
                debrisSystem.push(new Fragment(positionVector, tint));
            }
        }

        // --- INTERFACE FLOATING VFX ---
        function triggerFloatingText(message, worldCoordinates, hexadecimalColor) {
            const projection = worldCoordinates.clone().project(camera);
            const computedX = (projection.x * 0.5 + 0.5) * window.innerWidth;
            const computedY = (-(projection.y * 0.5) + 0.5) * window.innerHeight;

            const label = document.createElement('div');
            label.className = 'vfx-text';
            label.innerText = message;
            label.style.left = `${computedX}px`;
            label.style.top = `${computedY}px`;
            label.style.color = hexadecimalColor;
            document.getElementById('vfx-layer').appendChild(label);
            setTimeout(() => label.remove(), 600);
        }

        // --- INITIALIZE SYSTEM TARGET POOLS ---
        function buildTargetFleets() {
            for (let i = 0; i < GAME_CONFIG.targetPoolCount; i++) {
                trackingTargets.push(new FlyingTarget());
            }
        }

        // --- MEDIAPIPE GESTURE CAPTURE PIPELINE ---
        const feedbackVideo = document.getElementById('webcam');
        const trackingContext = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        trackingContext.setOptions({
            maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6
        });

        trackingContext.onResults((payload) => {
            if (!trackingActive) {
                trackingActive = true;
                document.getElementById('loading-status').innerText = "READY! CLICK BELOW TO POP!";
            }

            if (payload.multiHandLandmarks && payload.multiHandLandmarks.length > 0) {
                const nodes = payload.multiHandLandmarks[0];
                
                const indexTipNode = nodes[8];
                const normalizedX = (1 - indexTipNode.x) * 2 - 1;
                const normalizedY = (1 - indexTipNode.y) * 2 - 1;

                crosshairVector.set(normalizedX * 12, normalizedY * 7);

                if (runtimeState.active) {
                    laserTrack.visible = true;
                    reticleObject.visible = true;

                    // Super Strong Aim Assist Magnetism for kids
                    let outputAimCoordinate = new THREE.Vector2(crosshairVector.x, crosshairVector.y);
                    let proximityThreshold = 4.0; // Huge lock-on helper area
                    let focusedTarget = null;

                    trackingTargets.forEach(t => {
                        if (!t.active) return;
                        let targetCoord = new THREE.Vector2(t.mesh.position.x, t.mesh.position.y);
                        let range = targetCoord.distanceTo(crosshairVector);
                        if (range < proximityThreshold) {
                            proximityThreshold = range; focusedTarget = t;
                        }
                    });

                    if (focusedTarget) {
                        // Snaps crosshair directly to the big balloon effortlessly!
                        outputAimCoordinate.set(focusedTarget.mesh.position.x, focusedTarget.mesh.position.y);
                        reticleObject.material.color.setHex(0x00ff00); // Friendly green lock color
                    } else {
                        reticleObject.material.color.setHex(0xffff00);
                    }

                    reticleObject.position.set(outputAimCoordinate.x, outputAimCoordinate.y, 0);

                    const trackCoordinates = laserTrack.geometry.attributes.position.array;
                    trackCoordinates[0] = crosshairVector.x; trackCoordinates[1] = -7;
                    trackCoordinates[3] = outputAimCoordinate.x; trackCoordinates[4] = outputAimCoordinate.y;
                    laserTrack.geometry.attributes.position.needsUpdate = true;

                    const indexStretched = nodes[8].y < nodes[6].y;
                    const middleFolded = nodes[12].y > nodes[10].y;
                    const pistolPostureConfirmed = indexStretched && middleFolded;

                    if (pistolPostureConfirmed) {
                        const currentThumbY = nodes[4].y;
                        if (lastKnownThumbY !== null) {
                            const triggerVelocity = currentThumbY - lastKnownThumbY;
                            const timestamp = performance.now();

                            if (triggerVelocity > 0.035 && (timestamp - runtimeState.lastFireTime > GAME_CONFIG.baseCooldown)) {
                                dischargeSystem(outputAimCoordinate);
                                runtimeState.lastFireTime = timestamp;
                            }
                        }
                        lastKnownThumbY = currentThumbY;
                    } else {
                        lastKnownThumbY = null;
                    }
                }
            } else {
                laserTrack.visible = false; reticleObject.visible = false; lastKnownThumbY = null;
            }
        });

        const hardwareCapture = new Camera(feedbackVideo, {
            onFrame: async () => { await trackingContext.send({ image: feedbackVideo }); },
            width: 320, height: 240
        });
        hardwareCapture.start();

        // --- POUNT POPPING ENGINE ---
        function dischargeSystem(firingVector) {
            trackingTargets.forEach(target => {
                if (!target.active) return;
                const targetPosition = new THREE.Vector2(target.mesh.position.x, target.mesh.position.y);
                const absoluteRange = firingVector.distanceTo(targetPosition);

                if (absoluteRange <= target.collisionRadius) {
                    target.active = false; target.mesh.visible = false;
                    runtimeState.shotsHit++;

                    let evaluationReward = target.isGold ? 50 : 10;
                    runtimeState.score += evaluationReward;

                    const balloonColor = target.mesh.children[0].material.color.getHex();
                    triggerShatterBurst(target.mesh.position, balloonColor);

                    if (target.isGold) {
                        playSfx('gold');
                        triggerFloatingText("SUPER STAR! ⭐", target.mesh.position, "#ffea00");
                    } else {
                        playSfx('hit');
                        triggerFloatingText("POP!🎈", target.mesh.position, "#00ffff");
                    }

                    checkRoundCompletion();
                }
            });

            refreshHudIndicators();
        }

        function refreshHudIndicators() {
            document.getElementById('score-val').innerText = `🌟 ${runtimeState.score}`;
            const remainingCount = Math.max(0, GAME_CONFIG.totalTargetsToSpawn - runtimeState.targetsSpawnedSoFar);
            document.getElementById('target-countdown').innerText = remainingCount;
        }

        function checkRoundCompletion() {
            const currentActiveCount = trackingTargets.filter(t => t.active).length;
            
            // End only after 100 balloons are totally generated and cleared out
            if (runtimeState.targetsSpawnedSoFar >= GAME_CONFIG.totalTargetsToSpawn && currentActiveCount === 0) {
                runtimeState.active = false;
                laserTrack.visible = false; reticleObject.visible = false;

                document.getElementById('res-score').innerText = runtimeState.score;
                document.getElementById('res-hit').innerText = runtimeState.shotsHit;
                document.getElementById('summary-screen').style.display = 'flex';
            }
        }

        function triggerEnvironmentReboot() {
            runtimeState = {
                score: 0, shotsHit: 0, targetsSpawnedSoFar: 0, active: true, lastFireTime: 0
            };
            trackingTargets.forEach(t => { t.active = false; t.mesh.visible = false; });
            debrisSystem.forEach(d => scene.remove(d.mesh)); debrisSystem = [];
            refreshHudIndicators();
        }

        // --- BUTTON BINDINGS ---
        document.getElementById('start-btn').addEventListener('click', () => {
            if (!trackingActive) return;
            document.getElementById('start-screen').style.display = 'none';
            audioUnit.resume(); triggerEnvironmentReboot();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('summary-screen').style.display = 'none';
            triggerEnvironmentReboot();
        });

        // --- TICK ANIMATION ENGINE ---
        function renderFrameTick() {
            requestAnimationFrame(renderFrameTick);

            if (runtimeState.active && runtimeState.targetsSpawnedSoFar < GAME_CONFIG.totalTargetsToSpawn) {
                let liveCount = trackingTargets.filter(t => t.active).length;
                if (liveCount < GAME_CONFIG.targetPoolCount) {
                    let dormantInstance = trackingTargets.find(t => !t.active);
                    if (dormantInstance) dormantInstance.configureSpawn();
                }
            }

            trackingTargets.forEach(t => t.processFrames());
            debrisSystem = debrisSystem.filter(d => d.advance());

            visualRenderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            visualRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        buildTargetFleets();
        renderFrameTick();
    </script>
</body>
</html>
